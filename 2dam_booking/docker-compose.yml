version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: homenest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DB:-homenest}
      MYSQL_USER: ${MYSQL_USER:-homenest}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-homenest123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homenest-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-tu_secreto_super_seguro_cambialo_en_produccion}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${MYSQL_USER:-homenest}
      DB_PASSWORD: ${MYSQL_PASSWORD:-homenest123}
      DB_DATABASE: ${MYSQL_DB:-homenest}
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  mysql_data:
